version: 2

updates:
  # npm (pnpm) dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Group minor/patch updates to reduce PR noise
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Only security updates for production deps, not dev
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
