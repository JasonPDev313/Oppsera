name: Security — Semgrep SAST & SCA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly full scan (catches new rules/CVEs even without code changes)
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: semgrep/semgrep

    # Skip the scheduled run on forks (they won't have the token)
    if: github.repository_owner == 'JasonPDev313' || github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
