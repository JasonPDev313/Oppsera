name: Security — Semgrep SAST & SCA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly full scan (catches new rules/CVEs even without code changes)
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: semgrep/semgrep@sha256:7dfd648242bcbfa1d0cbb58e624c7cb799e31419e627f1fc7b1d7537d7d139de # latest

    # Skip the scheduled run on forks (they won't have the token)
    if: github.repository_owner == 'JasonPDev313' || github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Semgrep
        run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
